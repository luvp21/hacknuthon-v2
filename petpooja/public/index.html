<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Voice Ordering Copilot — Live Demo</title>
    <style>
        :root {
            --bg: #0f0f13;
            --surface: #18181f;
            --surface2: #22222d;
            --border: #2e2e3d;
            --accent: #f97316;
            --accent2: #fb923c;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --blue: #3b82f6;
            --text: #f1f1f5;
            --muted: #8a8a9a;
            --user-bubble: #1e3a5f;
            --bot-bubble: #22222d;
            --radius: 14px;
            --radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ─────────────────────────────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }

        .logo-ring {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #c2410c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.2;
        }

        header p {
            font-size: 11px;
            color: var(--muted);
        }

        .header-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lang-picker {
            display: flex;
            gap: 4px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px;
        }

        .lang-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 16px;
            background: transparent;
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }

        .lang-btn.active {
            background: var(--accent);
            color: #fff;
        }

        .new-chat-btn {
            padding: 7px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }

        .new-chat-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Main layout ─────────────────────────────────────────────────────────── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Chat area ───────────────────────────────────────────────────────────── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }

        /* State bar */
        .state-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            flex-shrink: 0;
        }

        .state-label {
            color: var(--muted);
        }

        .state-badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .state-IDLE,
        .state-GREETING {
            background: #1e3a5f;
            color: #60a5fa;
        }

        .state-COLLECTING_ORDER,
        .state-CLARIFYING {
            background: #14532d;
            color: #4ade80;
        }

        .state-UPSELLING {
            background: #78350f;
            color: #fbbf24;
        }

        .state-CONFIRMING {
            background: #3b0764;
            color: #c084fc;
        }

        .state-PROCESSING {
            background: #1c1917;
            color: #a8a29e;
        }

        .state-COMPLETED {
            background: #14532d;
            color: #4ade80;
        }

        .state-ERROR {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .intent-chip {
            margin-left: auto;
            padding: 2px 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 10px;
            color: var(--muted);
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeSlide .2s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-row.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .avatar.bot {
            background: linear-gradient(135deg, var(--accent), #c2410c);
        }

        .avatar.user {
            background: var(--user-bubble);
        }

        .bubble {
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.55;
            max-width: 100%;
        }

        .bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .user .bubble {
            background: var(--user-bubble);
            border-top-right-radius: 4px;
        }

        .ts {
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
            text-align: right;
        }

        .user .ts {
            text-align: left;
        }

        /* Typing indicator */
        .typing-row {
            display: flex;
            gap: 10px;
            align-self: flex-start;
        }

        .typing-bubble {
            padding: 12px 16px;
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-top-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
            animation: bounce 1.2s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: .2s;
        }

        .dot:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(.8);
                opacity: .5;
            }

            40% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        /* Input row */
        .input-row {
            display: flex;
            gap: 10px;
            padding: 14px 18px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        #msgInput {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color .15s;
        }

        #msgInput:focus {
            border-color: var(--accent);
        }

        #msgInput::placeholder {
            color: var(--muted);
        }

        #msgInput:disabled {
            opacity: .4;
        }

        #sendBtn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #sendBtn:hover:not(:disabled) {
            background: var(--accent2);
            transform: scale(1.05);
        }

        #sendBtn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        /* Mic button */
        #micBtn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #micBtn:hover:not(:disabled) {
            border-color: var(--accent);
            background: var(--surface3, var(--surface2));
        }

        #micBtn.listening {
            background: #ef4444;
            border-color: #ef4444;
            color: #fff;
            animation: mic-pulse 1.2s ease-in-out infinite;
        }

        #micBtn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        @keyframes mic-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, .45);
            }

            50% {
                box-shadow: 0 0 0 9px rgba(239, 68, 68, 0);
            }
        }

        /* Quick replies */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px 18px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .qr-btn {
            padding: 5px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: all .12s;
        }

        .qr-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Sidebar ──────────────────────────────────────────────────────────────── */
        .sidebar {
            width: 310px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--surface);
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 11px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .12s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }

        .tab-panel {
            display: none;
            flex: 1;
            overflow-y: auto;
            flex-direction: column;
        }

        .tab-panel.active {
            display: flex;
        }

        .tab-panel::-webkit-scrollbar {
            width: 4px;
        }

        .tab-panel::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        /* Cart panel */
        #cartPanel {
            padding: 14px;
            gap: 10px;
        }

        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 13px;
        }

        .cart-empty .icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .cart-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .cart-item-veg {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            border: 1.5px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .veg {
            color: var(--green);
        }

        .nonveg {
            color: var(--red);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-size: 13px;
            font-weight: 600;
        }

        .cart-item-meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        .cart-item-price {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }

        .cart-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        .totals-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--muted);
            padding: 2px 0;
        }

        .totals-row.final {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            padding-top: 8px;
            border-top: 1px solid var(--border);
            margin-top: 4px;
        }

        /* Menu panel */
        #menuPanel {
            padding: 14px;
            gap: 8px;
        }

        .menu-category {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--muted);
            padding: 8px 0 4px;
        }

        .menu-item {
            display: flex;
            gap: 10px;
            padding: 8px 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: border-color .12s;
        }

        .menu-item:hover {
            border-color: var(--accent);
        }

        .menu-item-info {
            flex: 1;
        }

        .menu-item-name {
            font-size: 12px;
            font-weight: 600;
        }

        .menu-item-price {
            font-size: 11px;
            color: var(--accent);
            margin-top: 2px;
        }

        .menu-item-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 4px;
        }

        .tag {
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 9px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .tag.bestseller {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Order complete card */
        .order-complete {
            margin: 12px;
            padding: 16px;
            background: #052e16;
            border: 1px solid #15803d;
            border-radius: var(--radius);
            text-align: center;
        }

        .order-complete h3 {
            font-size: 15px;
            color: var(--green);
            margin-bottom: 6px;
        }

        .order-complete .kot {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
        }

        .order-complete p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .sidebar {
                display: none;
            }
        }

        /* Welcome screen */
        #welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            padding: 40px 20px;
            text-align: center;
        }

        #welcome .big-icon {
            font-size: 56px;
        }

        #welcome h2 {
            font-size: 22px;
            font-weight: 800;
        }

        #welcome p {
            font-size: 14px;
            color: var(--muted);
            max-width: 340px;
            line-height: 1.6;
        }

        .start-btn {
            padding: 12px 28px;
            background: var(--accent);
            border: none;
            border-radius: 24px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
        }

        .start-btn:hover {
            background: var(--accent2);
            transform: scale(1.03);
        }

        .loading-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- ── Header ────────────────────────────────────────────────────────────────── -->
    <header>
        <div class="logo-ring">🍽️</div>
        <div>
            <h1>AI Voice Ordering Copilot</h1>
            <p id="restaurantLabel">Spice Garden Restaurant &mdash; Live Demo</p>
        </div>
        <div class="header-controls">
            <div class="lang-picker" id="langPicker">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="hi">हिंदी</button>
                <button class="lang-btn" data-lang="hinglish">Hinglish</button>
            </div>
            <button class="new-chat-btn" id="newChatBtn">↺ New Chat</button>
        </div>
    </header>

    <!-- ── Main layout ───────────────────────────────────────────────────────────── -->
    <div class="main">

        <!-- ── Chat area ───────────────────────────────────────────────────────────── -->
        <div class="chat-area">

            <!-- State bar -->
            <div class="state-bar" id="stateBar" style="display:none">
                <span class="state-label">State:</span>
                <span class="state-badge state-IDLE" id="stateBadge">IDLE</span>
                <span class="intent-chip" id="intentChip" style="display:none"></span>
            </div>

            <!-- Messages or welcome screen -->
            <div id="welcome">
                <div class="big-icon">🤖</div>
                <h2>Try the AI Ordering Bot</h2>
                <p>Experience our restaurant AI that understands natural language, upsells intelligently, and places
                    real orders into the database.</p>
                <button class="start-btn" id="startBtn" onclick="startSession()">
                    Start Ordering
                </button>
            </div>
            <div class="messages" id="messages" style="display:none"></div>

            <!-- Quick replies (hidden until session active) -->
            <div class="quick-replies" id="quickReplies" style="display:none"></div>

            <!-- Input -->
            <div class="input-row" id="inputRow" style="display:none">
                <button id="micBtn" title="Tap to speak" disabled onclick="toggleMic()">🎤</button>
                <input type="text" id="msgInput" placeholder="Type or tap 🎤 to speak your order…" autocomplete="off"
                    disabled />
                <button id="sendBtn" disabled onclick="sendMessage()">➤</button>
            </div>
        </div>

        <!-- ── Sidebar ──────────────────────────────────────────────────────────────── -->
        <div class="sidebar">
            <div class="sidebar-tabs">
                <button class="tab-btn active" onclick="switchTab('cart')">🛒 Cart</button>
                <button class="tab-btn" onclick="switchTab('menu')">📋 Menu</button>
            </div>
            <div class="tab-panel active" id="cartPanel">
                <div class="cart-empty">
                    <div class="icon">🛒</div>
                    Start chatting to build your order
                </div>
            </div>
            <div class="tab-panel" id="menuPanel">
                <p style="color:var(--muted);font-size:12px;padding:14px">Loading menu…</p>
            </div>
        </div>
    </div>

    <script>
        // ── State ──────────────────────────────────────────────────────────────────────
        const API = '';   // same origin
        let sessionId = null;
        let currentLang = 'en';
        let isWaiting = false;

        // Quick reply sets per state
        const QUICK = {
            COLLECTING_ORDER: [
                '2 butter chicken', 'paneer tikka', 'butter naan x2',
                "what's on the menu?", 'how much is gulab jamun?', 'confirm order'
            ],
            CONFIRMING: ['yes, confirm', 'no, add more', 'cancel order'],
            UPSELLING: ['yes please', 'no thanks'],
            COMPLETED: ['Start new order'],
        };

        // ── Init ───────────────────────────────────────────────────────────────────────
        loadMenu();

        document.getElementById('msgInput').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.lang === currentLang) return;
                currentLang = btn.dataset.lang;
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (sessionId) startSession(); // restart with new lang
            });
        });

        document.getElementById('newChatBtn').addEventListener('click', () => startSession());

        // ── Start session ──────────────────────────────────────────────────────────────
        async function startSession() {
            const btn = document.getElementById('startBtn');
            if (btn) btn.innerHTML = '<span class="loading-spinner"></span> Starting…';

            sessionId = null;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('messages').style.display = 'flex';
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('stateBar').style.display = 'flex';
            document.getElementById('inputRow').style.display = 'flex';
            document.getElementById('quickReplies').style.display = 'flex';
            clearCart();

            showTyping();

            try {
                const res = await fetch(`${API}/api/demo/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ language: currentLang }),
                });
                const json = await res.json();
                removeTyping();

                if (!json.success) throw new Error(json.message);

                sessionId = json.data.sessionId;
                document.getElementById('restaurantLabel').textContent =
                    `${json.data.restaurantName} — Live Demo`;

                appendBotMessage(json.data.reply);
                updateState(json.data.state);
                enableInput();
                setQuickReplies(json.data.state);
            } catch (err) {
                removeTyping();
                appendBotMessage('⚠️ Could not start session: ' + err.message);
                enableInput();
            }
        }

        // ── Send message ───────────────────────────────────────────────────────────────
        async function sendMessage(text) {
            const input = document.getElementById('msgInput');
            const message = text ?? input.value.trim();
            if (!message || isWaiting || !sessionId) return;

            input.value = '';
            appendUserMessage(message);
            disableInput();
            showTyping();

            try {
                const res = await fetch(`${API}/api/demo/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, message }),
                });
                const json = await res.json();
                removeTyping();

                if (!json.success) {
                    if (json.error === 'SESSION_NOT_FOUND') {
                        appendBotMessage('Session expired. Starting a new one…');
                        setTimeout(startSession, 1200);
                        return;
                    }
                    throw new Error(json.message);
                }

                const { reply, state, intent, cart, cartSubtotal, cartTax, cartTotal, isComplete, orderId, kotNumber } = json.data;

                appendBotMessage(reply);
                updateState(state, intent);
                renderCart(cart, cartSubtotal, cartTax, cartTotal);
                setQuickReplies(state);

                if (isComplete) {
                    if (kotNumber) showOrderComplete(orderId, kotNumber, cartTotal);
                    disableInput(true);
                } else {
                    enableInput();
                }
            } catch (err) {
                removeTyping();
                appendBotMessage('⚠️ Error: ' + err.message);
                enableInput();
            }
        }

        // ── DOM helpers ────────────────────────────────────────────────────────────────
        function appendBotMessage(text) {
            const msgs = document.getElementById('messages');
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const row = document.createElement('div');
            row.className = 'msg-row bot';
            row.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div>
      <div class="bubble">${escHtml(text)}</div>
      <div class="ts">${now}</div>
    </div>`;
            msgs.appendChild(row);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function appendUserMessage(text) {
            const msgs = document.getElementById('messages');
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const row = document.createElement('div');
            row.className = 'msg-row user';
            row.innerHTML = `
    <div class="avatar user">👤</div>
    <div>
      <div class="bubble">${escHtml(text)}</div>
      <div class="ts">${now}</div>
    </div>`;
            msgs.appendChild(row);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function showTyping() {
            isWaiting = true;
            const msgs = document.getElementById('messages');
            const el = document.createElement('div');
            el.className = 'typing-row'; el.id = 'typingIndicator';
            el.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function removeTyping() {
            isWaiting = false;
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function updateState(state, intent) {
            const badge = document.getElementById('stateBadge');
            badge.textContent = (state || 'IDLE').replace(/_/g, ' ');
            badge.className = `state-badge state-${state}`;

            const chip = document.getElementById('intentChip');
            if (intent && intent !== 'UNKNOWN') {
                chip.textContent = intent.replace(/_/g, ' ');
                chip.style.display = '';
            } else {
                chip.style.display = 'none';
            }
        }

        function enableInput() {
            const i = document.getElementById('msgInput');
            const b = document.getElementById('sendBtn');
            const m = document.getElementById('micBtn');
            i.disabled = false; b.disabled = false;
            if (m && speechSupported) m.disabled = false;
            i.focus();
        }

        function disableInput(permanent) {
            const i = document.getElementById('msgInput');
            const b = document.getElementById('sendBtn');
            const m = document.getElementById('micBtn');
            i.disabled = true; b.disabled = true;
            if (m) m.disabled = true;
            if (permanent) i.placeholder = 'Order complete. Start a new chat to order again.';
        }

        function setQuickReplies(state) {
            const container = document.getElementById('quickReplies');
            container.innerHTML = '';
            const replies = QUICK[state] || QUICK['COLLECTING_ORDER'];
            replies.forEach(r => {
                const btn = document.createElement('button');
                btn.className = 'qr-btn';
                btn.textContent = r;
                btn.onclick = () => sendMessage(r);
                container.appendChild(btn);
            });
        }

        // ── Cart ───────────────────────────────────────────────────────────────────────
        function clearCart() {
            document.getElementById('cartPanel').innerHTML = `
    <div class="cart-empty">
      <div class="icon">🛒</div>
      Start chatting to build your order
    </div>`;
        }

        function renderCart(cart, subtotalArg, taxArg, total) {
            const panel = document.getElementById('cartPanel');
            if (!cart?.length) { clearCart(); return; }

            // CartItem fields: unitPrice, qty, lineTotal, name, itemId
            let html = '';
            cart.forEach(item => {
                const isVeg = item.is_vegetarian ?? item.isVegetarian ?? false;
                // Support both camelCase (CartItem) and snake_case (order items)
                const qty       = item.qty       ?? item.quantity   ?? 1;
                const unitPrice = item.unitPrice  ?? item.unit_price ?? 0;
                const lineTotal = item.lineTotal  ?? item.total_price ?? (unitPrice * qty);
                const name      = item.name       ?? item.menu_item_name ?? 'Item';
                html += `
      <div class="cart-item">
        <div class="cart-item-veg ${isVeg ? 'veg' : 'nonveg'}">
          ${isVeg ? '●' : '●'}
        </div>
        <div class="cart-item-info">
          <div class="cart-item-name">${escHtml(name)}</div>
          <div class="cart-item-meta">Qty: ${qty}</div>
        </div>
        <div class="cart-item-price">₹${lineTotal.toFixed(0)}</div>
      </div>`;
            });

            // cartSubtotal / cartTax may be absent — compute from total if so
            const computedTotal    = typeof total    === 'number' ? total    : 0;
            const computedSubtotal = typeof subtotalArg === 'number' ? subtotalArg : Math.round(computedTotal / 1.05 * 100) / 100;
            const computedTax      = typeof taxArg     === 'number' ? taxArg     : Math.round((computedTotal - computedSubtotal) * 100) / 100;

            html += `<div class="cart-divider"></div>`;
            html += `<div class="totals-row"><span>Subtotal</span><span>₹${computedSubtotal.toFixed(0)}</span></div>`;
            html += `<div class="totals-row"><span>Tax (5%)</span><span>₹${computedTax.toFixed(0)}</span></div>`;
            html += `<div class="totals-row final"><span>Total</span><span>₹${computedTotal.toFixed(0)}</span></div>`;

            panel.innerHTML = html;
        }

        function showOrderComplete(orderId, kotNumber, total) {
            const panel = document.getElementById('cartPanel');
            panel.innerHTML = `
    <div class="order-complete">
      <h3>✅ Order Placed!</h3>
      <div class="kot">#KOT ${kotNumber || '—'}</div>
      <p>Total paid: ₹${(total || 0).toFixed(0)}</p>
      <p style="margin-top:8px;font-size:10px;word-break:break-all">${orderId || ''}</p>
    </div>`;
            switchTab('cart');
        }

        // ── Menu sidebar ───────────────────────────────────────────────────────────────
        async function loadMenu() {
            try {
                const res = await fetch(`${API}/api/demo/menu`);
                const json = await res.json();
                if (!json.success) return;

                const items = json.data;
                // Group by category
                const cats = {};
                items.forEach(i => {
                    if (!cats[i.category]) cats[i.category] = [];
                    cats[i.category].push(i);
                });

                let html = '';
                Object.entries(cats).forEach(([cat, catItems]) => {
                    html += `<div class="menu-category">${escHtml(cat)}</div>`;
                    catItems.forEach(item => {
                        const tags = (item.tags || []).slice(0, 3);
                        const tagHtml = tags.map(t =>
                            `<span class="tag ${t === 'bestseller' ? 'bestseller' : ''}">${escHtml(t)}</span>`
                        ).join('');
                        html += `
          <div class="menu-item" onclick="insertMenuItem(${JSON.stringify(item.name)})">
            <div class="cart-item-veg ${item.is_vegetarian ? 'veg' : 'nonveg'}" style="margin-top:2px">●</div>
            <div class="menu-item-info">
              <div class="menu-item-name">${escHtml(item.name)}</div>
              <div class="menu-item-price">₹${item.price}</div>
              <div class="menu-item-tags">${tagHtml}</div>
            </div>
          </div>`;
                    });
                });

                document.getElementById('menuPanel').innerHTML = html;
            } catch (e) {
                document.getElementById('menuPanel').innerHTML =
                    '<p style="color:var(--muted);font-size:12px;padding:14px">Could not load menu</p>';
            }
        }

        function insertMenuItem(name) {
            const input = document.getElementById('msgInput');
            input.value = input.value ? `${input.value}, ${name}` : `I want ${name}`;
            input.focus();
        }

        // ── Tab switch ─────────────────────────────────────────────────────────────────
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => {
                b.classList.toggle('active', (i === 0 && tab === 'cart') || (i === 1 && tab === 'menu'));
            });
            document.getElementById('cartPanel').classList.toggle('active', tab === 'cart');
            document.getElementById('menuPanel').classList.toggle('active', tab === 'menu');
        }

        // ── Utils ──────────────────────────────────────────────────────────────────────
        function escHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ── Voice Input (Web Speech API) ───────────────────────────────────────────────
        // Strategy: continuous=FALSE so Chrome auto-finalizes on natural speech pause.
        // The ⏹ button CANCELS (abort) rather than "stops and sends".
        // This matches how Siri / Google Assistant work and avoids the
        // "onresult never fires on manual stop" bug with continuous=true.
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const speechSupported = !!SpeechRec;
        let recognition = null;
        let isListening = false;
        let voiceText = '';
        let cancelledByUser = false;   // true when ⏹ tapped — suppresses auto-send

        const LANG_CODES = { en: 'en-IN', hi: 'hi-IN', hinglish: 'hi-IN' };

        console.log('[Voice] SpeechRecognition supported:', speechSupported,
            '| API:', window.SpeechRecognition ? 'SpeechRecognition' : window.webkitSpeechRecognition ? 'webkitSpeechRecognition' : 'NONE');

        if (!speechSupported) {
            console.warn('[Voice] Browser does not support SpeechRecognition — hiding mic button');
            const mb = document.getElementById('micBtn');
            if (mb) mb.style.display = 'none';
        }

        function resetMicUI() {
            console.log('[Voice] resetMicUI — isListening → false');
            isListening = false;
            const btn = document.getElementById('micBtn');
            if (btn) {
                btn.classList.remove('listening');
                btn.title = 'Tap to speak';
                btn.textContent = '🎤';
            }
            const inp = document.getElementById('msgInput');
            if (inp) inp.placeholder = 'Type or tap 🎤 to speak your order…';
        }

        function toggleMic() {
            console.log('[Voice] toggleMic() — supported:', speechSupported,
                '| sessionId:', sessionId, '| isWaiting:', isWaiting, '| isListening:', isListening);

            if (!speechSupported) {
                alert('Voice input is not supported in this browser. Please use Chrome or Edge.');
                return;
            }
            if (!sessionId) { console.warn('[Voice] Blocked — no sessionId yet'); return; }
            if (isWaiting) { console.warn('[Voice] Blocked — bot is responding'); return; }

            if (isListening) {
                // ⏹ tapped mid-speech — CANCEL (don't send)
                console.log('[Voice] User cancelled — calling abort()');
                cancelledByUser = true;
                voiceText = '';
                document.getElementById('msgInput').value = '';
                if (recognition) recognition.abort();
                return;
            }

            // Fresh instance every call (Chrome requires this)
            recognition = new SpeechRec();
            recognition.lang = LANG_CODES[currentLang] || 'en-IN';
            recognition.continuous = false;   // Chrome auto-stops after natural speech pause
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;
            voiceText = '';
            cancelledByUser = false;

            console.log('[Voice] New recognition — lang:', recognition.lang, '| continuous: false');

            recognition.onstart = () => {
                console.log('[Voice] onstart ✅ — mic is live');
                isListening = true;
                const btn = document.getElementById('micBtn');
                btn.classList.add('listening');
                btn.title = 'Tap to cancel';
                btn.textContent = '⏹';
                const inp = document.getElementById('msgInput');
                inp.value = '';
                inp.placeholder = 'Speak now… (auto-sends when you pause)';
                inp.disabled = false;
            };

            recognition.onresult = (e) => {
                // Show live interim transcript; capture final text
                let interim = '', final = '';
                for (const r of e.results) {
                    if (r.isFinal) final += r[0].transcript;
                    else interim += r[0].transcript;
                }
                const display = (final || interim).trim();
                voiceText = display;
                document.getElementById('msgInput').value = display;
                console.log('[Voice] onresult — isFinal:', e.results[e.results.length - 1]?.isFinal,
                    '| text:', JSON.stringify(display));
            };

            recognition.onend = () => {
                // onend ALWAYS fires last — even after onerror — so reset cancelledByUser here only
                console.log('[Voice] onend — cancelled:', cancelledByUser,
                    '| voiceText:', JSON.stringify(voiceText),
                    '| input.value:', JSON.stringify(document.getElementById('msgInput').value));
                resetMicUI();

                if (cancelledByUser) {
                    console.log('[Voice] Cancelled — not sending');
                    cancelledByUser = false;
                    voiceText = '';
                    document.getElementById('msgInput').value = '';
                    return;
                }

                const text = voiceText || document.getElementById('msgInput').value.trim();
                voiceText = '';

                if (!text) {
                    console.warn('[Voice] onend — empty transcript');
                    document.getElementById('msgInput').placeholder =
                        "Didn't catch that — tap 🎤 and speak clearly, or type";
                    return;
                }

                console.log('[Voice] Sending:', JSON.stringify(text));
                document.getElementById('msgInput').value = text;
                sendMessage(text);
            };

            recognition.onerror = (e) => {
                console.error('[Voice] onerror — code:', e.error);
                // DO NOT reset cancelledByUser here — onend fires after this and needs the flag
                resetMicUI();
                voiceText = '';
                if (cancelledByUser || e.error === 'aborted') return;  // silent cancel
                if (e.error === 'not-allowed') {
                    appendBotMessage('🎤 Microphone access denied — allow mic permissions and try again.');
                } else if (e.error === 'network') {
                    appendBotMessage('🎤 Network error with voice recognition. Try typing instead.');
                } else if (e.error === 'no-speech') {
                    document.getElementById('msgInput').placeholder =
                        "Didn't hear anything — tap 🎤 and speak clearly, or type";
                } else {
                    appendBotMessage('🎤 Voice error: ' + e.error + '. Try typing instead.');
                }
            };

            console.log('[Voice] Calling recognition.start()…');
            recognition.start();
        }
    </script>
</body>

</html>
